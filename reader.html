<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mein EPUB Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #222; color: white; }
        #viewer { width: 100vw; height: 85vh; background: white; }
        .controls { display: flex; justify-content: space-between; padding: 20px; background: #333; }
        button { padding: 10px 25px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #777; }
    </style>
</head>
<body>

    <div id="viewer"></div>

    <div class="controls">
        <button id="prev">⬅ Zurück</button>
        <button id="next">Vorwärts ➡</button>
    </div>

    <script>
        // 1. Pfad aus der URL holen
        const params = new URLSearchParams(window.location.search);
        let bookPath = params.get("book");

        if (!bookPath) {
            alert("Kein Buch ausgewählt! Geh zurück zur Startseite.");
        } else {
            // 2. Das Buch initialisieren
            const book = ePub(bookPath);
            const rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated", // Seite für Seite wie ein echtes Buch
                manager: "default"
            });

            // 3. Buch anzeigen
            rendition.display().catch(err => {
                console.error("Fehler beim Laden:", err);
                alert("Fehler: Das Buch konnte nicht geladen werden. Prüf mal die Groß/Kleinschreibung vom Dateinamen!");
            });

            // 4. Steuerung
            document.getElementById("next").onclick = () => rendition.next();
            document.getElementById("prev").onclick = () => rendition.prev();
            
            // Pfeiltasten auf der Tastatur unterstützen
            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowRight") rendition.next();
                if (e.key === "ArrowLeft") rendition.prev();
            });
        }
    </script>
</body>
</html>
