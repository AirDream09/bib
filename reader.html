<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EPUB Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <style>
        body { margin: 0; background: #fafafa; }
        #viewer { width: 100vw; height: 90vh; }
        .controls { text-align: center; padding: 10px; background: #eee; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div class="controls">
        <button id="prev">⬅ Zurück</button>
        <button id="next">Vorwärts ➡</button>
    </div>

    <script>
        // Holt den Dateinamen aus der URL (z.B. reader.html?book=books/test.epub)
        const params = new URLSearchParams(window.location.search);
        const bookPath = params.get("book");

        const book = ePub(bookPath);
        const rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            flow: "paginated"
        });

        rendition.display();

        // Buttons steuern
        document.getElementById("next").addEventListener("click", () => rendition.next());
        document.getElementById("prev").addEventListener("click", () => rendition.prev());
    </script>
</body>
</html>
